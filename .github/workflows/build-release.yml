name: Build & Release

# Triggers:
# - Push a tag like v0.1.0 → builds release .exe + publishes GitHub Release
# - Manual dispatch (workflow_dispatch) → builds test .exe attached as workflow artifact
#   (use this for testing a build without creating a public release)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the test build (e.g. 0.1.0-test)'
        required: true
        default: '0.0.0-test'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed by softprops/action-gh-release to create the release

    steps:
      # ---------- Setup ----------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Bun node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      # ---------- Determine version ----------
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # Strip the leading 'v' from the tag: v0.1.0 -> 0.1.0
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building release version $VERSION"

      - name: Set version from manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "Building test version ${{ github.event.inputs.version }}"

      - name: Bump version in tauri.conf.json
        shell: bash
        run: |
          # Patch the version field in tauri.conf.json
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2));
            console.log('Updated version to', conf.version);
          "

      # ---------- Build ----------
      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build static frontend
        run: bun run build:static

      - name: Build Tauri .exe
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # Don't let the action create the release itself — we'll do it manually
          # so we can attach latest.json alongside the .exe
          tagName: ''
          releaseName: ''
          releaseBody: ''
          releaseDraft: false
          prerelease: false
          # args: --target x86_64-pc-windows-msvc

      # ---------- Find the .exe ----------
      - name: Find built installer
        id: find_exe
        shell: bash
        run: |
          # Locate the NSIS installer (primary)
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*.exe" | head -1)
          if [ -z "$EXE" ]; then
            echo "No NSIS installer found, falling back to MSI"
            EXE=$(find src-tauri/target/release/bundle/msi -name "*.msi" | head -1)
          fi
          if [ -z "$EXE" ]; then
            echo "ERROR: No installer found"
            ls -R src-tauri/target/release/bundle/ 2>&1 || true
            exit 1
          fi
          echo "Found installer: $EXE"
          # Get the basename
          BASENAME=$(basename "$EXE")
          echo "BASENAME=$BASENAME" >> $GITHUB_ENV
          echo "EXE_PATH=$EXE" >> $GITHUB_ENV
          # Copy to a predictable name for upload
          cp "$EXE" "UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe"
          echo "UPLOAD_FILE=UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe" >> $GITHUB_ENV

      # ---------- Generate latest.json ----------
      - name: Generate latest.json
        shell: bash
        run: |
          # The download URL points to this same GitHub Release's asset
          # GitHub uses a predictable pattern: releases/download/<tag>/<filename>
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${RELEASE_VERSION}-test"
          fi
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${UPLOAD_FILE}"
          cat > latest.json << EOF
          {
            "version": "${RELEASE_VERSION}",
            "notes": "Auto-built release ${RELEASE_VERSION} from commit ${{ github.sha }}",
            "pub_date": "$(date -u +"%Y-%m-%dT%H:%M:%SZ")",
            "platforms": {
              "windows-x86_64": {
                "signature": "",
                "url": "${DOWNLOAD_URL}"
              }
            }
          }
          EOF
          echo "Generated latest.json:"
          cat latest.json

      # ---------- Upload as GitHub Release (only on tag push) ----------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.UPLOAD_FILE }}
            latest.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Upload as workflow artifact (manual dispatch only) ----------
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: UnemploymentSimulator-${{ env.RELEASE_VERSION }}
          path: |
            ${{ env.UPLOAD_FILE }}
            latest.json
          retention-days: 30
