name: Build & Release

# Triggers:
# - Push a tag like v0.1.0 → builds release .exe + publishes GitHub Release
# - Manual dispatch (workflow_dispatch) → builds test .exe attached as workflow artifact
#   (use this for testing a build without creating a public release)

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version label for the test build (e.g. 0.1.0-test)'
        required: true
        default: '0.0.0-test'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write   # needed by softprops/action-gh-release to create the release

    steps:
      # ---------- Setup ----------
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Cache Bun node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-bun-${{ hashFiles('bun.lock') }}
          restore-keys: ${{ runner.os }}-bun-

      # ---------- Determine version ----------
      - name: Set version from tag
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          # Strip the leading 'v' from the tag: v0.1.0 -> 0.1.0
          VERSION="${GITHUB_REF#refs/tags/v}"
          echo "RELEASE_VERSION=$VERSION" >> $GITHUB_ENV
          echo "Building release version $VERSION"

      - name: Set version from manual dispatch
        if: github.event_name == 'workflow_dispatch'
        shell: bash
        run: |
          echo "RELEASE_VERSION=${{ github.event.inputs.version }}" >> $GITHUB_ENV
          echo "Building test version ${{ github.event.inputs.version }}"

      - name: Bump version in tauri.conf.json
        shell: bash
        run: |
          # Patch the version field in tauri.conf.json
          node -e "
            const fs = require('fs');
            const path = 'src-tauri/tauri.conf.json';
            const conf = JSON.parse(fs.readFileSync(path, 'utf8'));
            conf.version = process.env.RELEASE_VERSION;
            fs.writeFileSync(path, JSON.stringify(conf, null, 2));
            console.log('Updated version to', conf.version);
          "

      # ---------- Build ----------
      - name: Install frontend deps
        run: bun install --frozen-lockfile

      - name: Build static frontend
        run: bun run build:static

      - name: Install Tauri CLI (for direct build, not via action)
        run: cargo install tauri-cli --version "^2.0" --locked

      - name: Build Tauri .exe + .sig (with signing)
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          # Build directly with the Tauri CLI (not the action) so signing env vars
          # are properly inherited. The action wraps tauri build but doesn't always
          # pass env vars through to the signing step.
          cd src-tauri
          cargo tauri build --bundles nsis
          cd ..
          echo "Build complete. Listing bundle dir:"
          find src-tauri/target/release/bundle -type f 2>&1 || true

      # ---------- Find the .exe + .sig ----------
      - name: Find built installer + signature
        id: find_exe
        shell: bash
        run: |
          # Locate the NSIS installer
          EXE=$(find src-tauri/target/release/bundle/nsis -name "*-setup.exe" -print0 | head -z -n1 | tr -d '\0')
          if [ -z "$EXE" ]; then
            echo "ERROR: No NSIS installer found"
            ls -R src-tauri/target/release/bundle/ 2>&1 || true
            exit 1
          fi
          echo "Found installer: $EXE"

          # Copy to a predictable name for upload
          cp "$EXE" "UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe"
          echo "UPLOAD_FILE=UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe" >> $GITHUB_ENV

          # Try to find the .sig file — Tauri may place it next to the .exe OR
          # the tauri-action may have failed to write it. Search broadly.
          SIG_FILE=""
          # First try: same name as .exe but with .sig extension
          if [ -f "${EXE}.sig" ]; then
            SIG_FILE="${EXE}.sig"
          fi
          # Fallback: any .sig file in the nsis bundle directory
          if [ -z "$SIG_FILE" ]; then
            SIG_FILE=$(find src-tauri/target/release/bundle/nsis -name "*.sig" -print0 | head -z -n1 | tr -d '\0')
          fi
          # Fallback 2: any .sig in the entire bundle directory
          if [ -z "$SIG_FILE" ]; then
            SIG_FILE=$(find src-tauri/target/release/bundle -name "*.sig" -print0 | head -z -n1 | tr -d '\0')
          fi

          if [ -n "$SIG_FILE" ]; then
            echo "Found signature: $SIG_FILE"
            cp "$SIG_FILE" "UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe.sig"
            echo "UPLOAD_SIG=UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe.sig" >> $GITHUB_ENV
            SIGNATURE=$(cat "UnemploymentSimulator_${RELEASE_VERSION}_x64-setup.exe.sig" | tr -d '\n')
            echo "$SIGNATURE" > /tmp/signature.txt
            echo "SIGNATURE_FILE=/tmp/signature.txt" >> $GITHUB_ENV
            echo "Signature length: ${#SIGNATURE}"
          else
            echo "WARNING: No .sig file found anywhere in bundle directory!"
            echo "Listing all files in bundle:"
            find src-tauri/target/release/bundle -type f 2>&1 || true
            echo "SIGNATURE_FILE=" >> $GITHUB_ENV
          fi

      # ---------- Generate latest.json ----------
      - name: Generate latest.json
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "push" ]; then
            TAG="${GITHUB_REF#refs/tags/}"
          else
            TAG="v${RELEASE_VERSION}-test"
          fi
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/${UPLOAD_FILE}"

          # Read signature from file if it exists
          SIGNATURE=""
          if [ -n "${SIGNATURE_FILE}" ] && [ -f "${SIGNATURE_FILE}" ]; then
            SIGNATURE=$(cat "${SIGNATURE_FILE}" | tr -d '\n')
          fi

          # Use Python to generate JSON safely (avoids bash escaping issues with base64 sig)
          python3 -c "
          import json, sys
          data = {
            'version': '${RELEASE_VERSION}',
            'notes': 'Unemployment Simulator ${RELEASE_VERSION} — auto-built from commit ${{ github.sha }}',
            'pub_date': '$(date -u +\"%Y-%m-%dT%H:%M:%SZ\")',
            'platforms': {
              'windows-x86_64': {
                'signature': sys.argv[1],
                'url': '${DOWNLOAD_URL}'
              }
            }
          }
          with open('latest.json', 'w') as f:
            json.dump(data, f, indent=2)
          " "$SIGNATURE"
          echo "Generated latest.json:"
          cat latest.json

      # ---------- Upload as GitHub Release (only on tag push) ----------
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ env.UPLOAD_FILE }}
            ${{ env.UPLOAD_SIG }}
            latest.json
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # ---------- Upload as workflow artifact (manual dispatch only) ----------
      - name: Upload workflow artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: UnemploymentSimulator-${{ env.RELEASE_VERSION }}
          path: |
            ${{ env.UPLOAD_FILE }}
            ${{ env.UPLOAD_SIG }}
            latest.json
          retention-days: 30
